name: Build and Sign Grafana Plugin

on:
  workflow_dispatch:
    inputs:
      rootUrl:
        description: 'Grafana Root URL to sign the plugin with.'
        required: true
        type: string
        default: ''

env:
  PLUGIN_NAME: axiomhq-metrics-datasource

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build and sign Grafana plugin
        run: |
          PLUGIN_ZIP_FILENAME=${{ env.PLUGIN_NAME }}-${{ github.sha }}.zip

          npm install
          npm run build

          export GRAFANA_ACCESS_POLICY_TOKEN=${{ secrets.GRAFANA_CLOUD_ACCESS_POLICY_TOKEN }}
          npx -y @grafana/sign-plugin@latest --rootUrls ${{ inputs.rootUrl }}

          mv dist ${{ env.PLUGIN_NAME }}
          zip -r $PLUGIN_ZIP_FILENAME ${{ env.PLUGIN_NAME }}

          echo "PLUGIN_ZIP_FILENAME=${PLUGIN_ZIP_FILENAME}" >> $GITHUB_ENV

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: axiom-metrics-grafana-plugin
          path: ${{ env.PLUGIN_ZIP_FILENAME }}

      - name: Display build information
        run: |
          echo "✅ Plugin successfully built and signed!"
          echo "Plugin name: ${{ env.PLUGIN_NAME }}"
          echo "Plugin filename: ${{ env.PLUGIN_ZIP_FILENAME }}"
          echo "Root URL used for signing: ${{ inputs.rootUrl }}"
          echo "To download the plugin, use the Artifacts section in the GitHub Actions UI."
