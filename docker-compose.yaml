services:
  grafana:
    user: root
    container_name: 'axiomhq-metrics-datasource'

    build:
      context: ./.config
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.3.0}
        development: ${DEVELOPMENT:-false}
    ports:
      - 3333:3000/tcp
    volumes:
      - ./dist:/var/lib/grafana/plugins/axiomhq-metrics-datasource
      - ./provisioning:/etc/grafana/provisioning
      - .:/root/axiomhq-metrics-datasource

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.axiomhq-metrics-datasource:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: axiomhq-metrics-datasource
